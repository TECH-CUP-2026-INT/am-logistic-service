services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: service_logistics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - logistics_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  service-logistics:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/service_logistics
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      # TODO: apuntar a las URLs reales de Torneos, Equipos y Auditoria cuando existan
      TORNEOS_SERVICE_URL: http://host.docker.internal:8081
      EQUIPOS_SERVICE_URL: http://host.docker.internal:8082
      AUDITORIA_SERVICE_URL: http://host.docker.internal:8083
    ports:
      - "8080:8080"

volumes:
  logistics_pgdata:
