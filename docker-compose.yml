services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: service_logistics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      # 5434 en el host para no chocar con el Postgres de am-matches-service
      # (5432) ni con otro Postgres local; el contenedor de la app usa el
      # puerto interno 5432 via la red de docker.
      - "5434:5432"
    volumes:
      - logistics_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  service-logistics:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/service_logistics
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SERVER_PORT: 8085
      INTERNAL_API_KEY: local-dev-internal-key
      # TODO: apuntar a las URLs reales de Torneos, Equipos y Auditoria cuando existan
      TORNEOS_SERVICE_URL: http://host.docker.internal:8081
      EQUIPOS_SERVICE_URL: http://host.docker.internal:8082
      AUDITORIA_SERVICE_URL: http://host.docker.internal:8083
    ports:
      # 8085 para no chocar con matches (8080) ni notifications (8083) al
      # levantar los 3 servicios de astromerge en simultaneo.
      - "8085:8085"

volumes:
  logistics_pgdata:
