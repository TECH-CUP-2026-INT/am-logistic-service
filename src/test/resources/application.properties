# Configuracion exclusiva para @SpringBootTest: la URI real de Mongo la provee
# Testcontainers via @ServiceConnection (ver AbstractMongoIntegrationTest). Los
# tests unitarios de service/impl no usan Spring Context y no dependen de este archivo.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

logistics.integration.torneos.base-url=http://localhost:8081
logistics.integration.equipos.base-url=http://localhost:8082
logistics.integration.auditoria.base-url=http://localhost:8083
