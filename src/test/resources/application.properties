# Configuracion exclusiva para @SpringBootTest: usa H2 en memoria para que el
# contexto cargue sin depender de un Postgres real. Los tests unitarios de
# service/impl no usan Spring Context y no dependen de este archivo.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
spring.datasource.url=jdbc:h2:mem:logistics;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

logistics.integration.torneos.base-url=http://localhost:8081
logistics.integration.equipos.base-url=http://localhost:8082
logistics.integration.auditoria.base-url=http://localhost:8083
