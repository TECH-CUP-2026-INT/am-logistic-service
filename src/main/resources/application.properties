spring.application.name=service-logistics
server.port=${SERVER_PORT:8080}

# La autenticacion real la resuelve JwtClaimsFilter a partir del JWT del Gateway;
# no usamos el UserDetailsService/usuario en memoria por defecto de Spring Security.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/service_logistics}
spring.data.mongodb.auto-index-creation=true

# Integraciones externas (TODO: confirmar URLs reales con cada equipo dueno)
logistics.integration.torneos.base-url=${TORNEOS_SERVICE_URL:http://localhost:8081}
logistics.integration.equipos.base-url=${EQUIPOS_SERVICE_URL:http://localhost:8082}
logistics.integration.auditoria.base-url=${AUDITORIA_SERVICE_URL:http://localhost:8083}

# Seguridad: nombre del claim de roles dentro del JWT ya validado por el Gateway
techcup.security.role-claim=${ROLE_CLAIM:roles}
# Debe coincidir con techcup.security.internal.api-key de los demas servicios propios
# (matches, notifications) para autenticar llamadas servicio-a-servicio
techcup.security.internal.api-key=${INTERNAL_API_KEY:local-dev-internal-key}

# Actuator: solo se expone health/info, el resto queda cerrado por defecto
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# OpenAPI / Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
